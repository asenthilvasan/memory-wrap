# image: nvidia/cuda:12.4.1-cudnn-devel-ubuntu20.04
# image: nvidia/12.8.1-cudnn-devel-ubuntu20.04

# Tip -> Find and replace "assenthi-task4" with the PVC name
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assenthi-deployment
  labels:
    k8s-app: assenthi-task4
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: assenthi-task4
  template:
    metadata:
      labels:
        k8s-app: assenthi-task4
    spec:
      containers:
      - name: assenthi-task4
        image: pytorch/pytorch
        resources:
          limits:
            memory: 100Gi
            cpu: "16"
            nvidia.com/gpu: "1"
          requests:
            memory: 100Gi
            cpu: "8"
            nvidia.com/gpu: "1"
        command: [ "sh", "-c", "sleep infinity" ]
        volumeMounts:
        - mountPath: /pvcvolume
          name: vol1
        # - mountPath: /shapenet
        #   name: vol2
      volumes:
      - name: vol1
        persistentVolumeClaim:
          claimName: assenthi-task4
